apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: union-api
  namespace: union-api
spec:
  parentRefs:
    - name: panda-external-gateway
      namespace: gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: union-api
          port: 80
