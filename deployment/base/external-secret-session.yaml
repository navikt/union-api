apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: session-secret
  namespace: union-api
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-manager
  target:
    name: session-secret
    creationPolicy: Owner
  data:
    - secretKey: session-secret
      remoteRef:
        key: union-api-web-session-secret
